<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Black background with smooth premium rounded corners -->
  <rect width="512" height="512" rx="120" fill="#000000" />
  
  <!-- Upward trending curve line -->
  <path d="M 95,303 Q 230,283 385,113" fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" />
  
  <!-- Arrowhead pointing top-right -->
  <path d="M 335,103 H 395 V 163" fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Four thick vertical bars -->
  <rect x="119" y="333" width="52" height="82" rx="16" fill="#ffffff" />
  <rect x="193" y="293" width="52" height="122" rx="16" fill="#ffffff" />
  <rect x="267" y="243" width="52" height="172" rx="16" fill="#ffffff" />
  <rect x="341" y="183" width="52" height="232" rx="16" fill="#ffffff" />
  
  <!-- Horizontal baseline -->
  <path d="M 89,403 H 423" stroke="#ffffff" stroke-width="32" stroke-linecap="round" />
</svg>
